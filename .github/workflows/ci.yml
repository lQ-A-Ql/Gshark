name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Root desktop dev-tag tests
        working-directory: .
        run: go test -tags dev ./...

      - name: Go fmt check
        run: |
          test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Backend boundary check
        run: go test ./internal/architecture -run TestBackendArchitectureBoundaries -count=1 -v

      - name: Backend focused contracts
        run: go test ./internal/engine -run "TestGatherEvidence|Test.*InvestigationReport|TestBundledPublic" -count=1 -v

      - name: Backend governance register check
        run: go test ./internal/governance -run "Test.*Defect|Test.*Report|Test.*Archive" -count=1 -v

      - name: Go test
        run: go test ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.31.0 --activate

      - name: Resolve pnpm store
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend checks
        run: pnpm run ci
